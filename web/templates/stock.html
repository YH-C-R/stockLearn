{% extends "base.html" %}
{% block title %}{{ stock_id }} — Analysis{% endblock %}

{% block content %}
<div class="stock-header">
  <a href="/" class="back-link">← Back</a>
  <h2>{{ stock_id }}</h2>
</div>

<!-- Analysis scores (loaded via fetch) -->
<div id="analysis-root">
  <p class="loading">Loading analysis for {{ stock_id }}…</p>
</div>

<!-- Chart section (always present; canvas hidden until data arrives) -->
<section class="card" id="chart-card" style="display:none">
  <h3>
    Price Chart (2 years)
    <span class="chart-legend">
      <span class="legend-dot" style="background:#4a6fa5"></span> Close
      <span class="legend-dot" style="background:#f6ad55"></span> MA20
      <span class="legend-dot" style="background:#68d391"></span> MA60
      <span class="legend-dot legend-star" style="color:#e53e3e">★</span> Davis Double
      <span class="legend-dot legend-tri" style="color:#805ad5">▲</span> PriceVolume
    </span>
  </h3>
  <div class="chart-wrap">
    <canvas id="priceChart"></canvas>
  </div>
  <p id="chart-error" class="error" style="display:none"></p>
</section>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<script>
const stockId = "{{ stock_id }}";

// ── Analysis scores ──────────────────────────────────────────────────────────

async function loadAnalysis() {
  const root = document.getElementById("analysis-root");
  try {
    const res  = await fetch(`/api/analysis/${stockId}`);
    const data = await res.json();
    if (!res.ok) {
      root.innerHTML = `<p class="error">Error: ${data.error || "Failed to load data."}</p>`;
      return;
    }
    root.innerHTML = renderAnalysis(data);
  } catch (err) {
    root.innerHTML = `<p class="error">Network error: ${err.message}</p>`;
  }
}

function fmt(val, digits = 4) {
  return val != null ? Number(val).toFixed(digits) : "N/A";
}

function renderAnalysis(d) {
  const rec = d.recommendation;
  const lt  = d.long_term;
  const st  = d.short_term;
  const lat = d.latest;

  const recClass = {
    "STRONG BUY": "badge-strong-buy",
    "BUY":        "badge-buy",
    "WAIT":       "badge-wait",
    "AVOID":      "badge-avoid",
  }[rec.label] || "";

  const reasonsHtml = rec.reasons.length
    ? rec.reasons.map(r => `<li>${r}</li>`).join("")
    : "<li>—</li>";

  const epsHtml = lt.eps_quarters.length
    ? lt.eps_quarters.map(v => fmt(v, 2)).join(" → ")
    : "N/A";

  const warningsHtml = d.warnings.length
    ? `<p class="warning">⚠ ${d.warnings.join(" | ")}</p>`
    : "";

  return `
    ${warningsHtml}
    <section class="card recommendation-card">
      <span class="badge ${recClass}">${rec.label}</span>
      <span class="action-label">Action: <strong>${rec.action}</strong></span>
      <span class="confidence">Confidence: ${fmt(rec.confidence, 2)}</span>
      <p class="summary">${rec.summary}</p>
      <ul class="reasons">${reasonsHtml}</ul>
    </section>
    <div class="score-grid">
      <section class="card">
        <h3>Long-Term Score</h3>
        <div class="score-big">${fmt(lt.score, 2)}</div>
        <div class="score-class">${lt.class}</div>
        <table class="score-table">
          <tr><td>EPS trend (50%)</td>   <td>${fmt(lt.eps_score, 2)}</td></tr>
          <tr><td>PE re-rating (30%)</td><td>${fmt(lt.pe_score, 2)}</td></tr>
          <tr><td>Growth (20%)</td>       <td>${fmt(lt.growth_score, 2)}</td></tr>
        </table>
        <p class="score-detail">Current PE: ${fmt(lt.current_pe, 1)} &nbsp;|&nbsp; Avg PE: ${fmt(lt.avg_pe, 1)}</p>
        <p class="score-detail">Last 4 qtrs EPS: ${epsHtml}</p>
      </section>
      <section class="card">
        <h3>Short-Term Score</h3>
        <div class="score-big">${fmt(st.score, 2)}</div>
        <div class="score-class">${st.signal}</div>
        <table class="score-table">
          <tr><td>Price (30%)</td>  <td>${fmt(st.price_score, 2)}</td></tr>
          <tr><td>Volume (40%)</td> <td>${fmt(st.volume_score, 2)}</td></tr>
          <tr><td>Margin (30%)</td> <td>${fmt(st.margin_score, 2)}</td></tr>
        </table>
        <p class="score-detail">MA20: ${fmt(st.ma20, 1)} &nbsp;|&nbsp; MA60: ${fmt(st.ma60, 1)}</p>
      </section>
      <section class="card">
        <h3>Latest Data</h3>
        <table class="score-table">
          <tr><td>Date</td>  <td>${lat.date  ?? "N/A"}</td></tr>
          <tr><td>Close</td> <td>${fmt(lat.close, 2)}</td></tr>
          <tr><td>EPS</td>   <td>${fmt(lat.eps,   2)}</td></tr>
          <tr><td>PE</td>    <td>${fmt(lat.pe,    2)}</td></tr>
        </table>
      </section>
    </div>
  `;
}

// ── Chart ────────────────────────────────────────────────────────────────────

async function loadChart() {
  const card  = document.getElementById("chart-card");
  const errEl = document.getElementById("chart-error");

  try {
    const res  = await fetch(`/api/chart/${stockId}`);
    const data = await res.json();

    if (!res.ok) {
      errEl.textContent = data.error || "Failed to load chart data.";
      errEl.style.display = "block";
      card.style.display  = "block";
      return;
    }

    card.style.display = "block";
    renderChart(data);

  } catch (err) {
    errEl.textContent   = `Network error: ${err.message}`;
    errEl.style.display = "block";
    card.style.display  = "block";
  }
}

function renderChart(data) {
  // Build scatter point arrays for signal markers
  // Each point: { x: dateString, y: price }
  const ddPoints = (data.signals.davis_double || [])
    .filter(s => s.price != null)
    .map(s => ({ x: s.x || s.date, y: s.price, score: s.score }));

  const pvPoints = (data.signals.price_volume || [])
    .filter(s => s.price != null)
    .map(s => ({ x: s.x || s.date, y: s.price, score: s.score }));

  const ctx = document.getElementById("priceChart").getContext("2d");

  new Chart(ctx, {
    type: "line",
    data: {
      labels: data.dates,
      datasets: [
        {
          label:           "Close",
          data:            data.close,
          borderColor:     "#4a6fa5",
          borderWidth:     1.5,
          pointRadius:     0,
          tension:         0.1,
          yAxisID:         "y",
        },
        {
          label:           "MA20",
          data:            data.ma20,
          borderColor:     "#f6ad55",
          borderWidth:     1.2,
          borderDash:      [4, 3],
          pointRadius:     0,
          tension:         0.1,
          yAxisID:         "y",
        },
        {
          label:           "MA60",
          data:            data.ma60,
          borderColor:     "#68d391",
          borderWidth:     1.2,
          borderDash:      [6, 4],
          pointRadius:     0,
          tension:         0.1,
          yAxisID:         "y",
        },
        {
          label:           "Davis Double ★",
          data:            ddPoints,
          type:            "scatter",
          borderColor:     "#e53e3e",
          backgroundColor: "#e53e3e",
          pointRadius:     8,
          pointStyle:      "star",
          showLine:        false,
          yAxisID:         "y",
        },
        {
          label:           "PriceVolume ▲",
          data:            pvPoints,
          type:            "scatter",
          borderColor:     "#805ad5",
          backgroundColor: "#805ad5",
          pointRadius:     7,
          pointStyle:      "triangle",
          showLine:        false,
          yAxisID:         "y",
        },
      ],
    },
    options: {
      responsive:          true,
      maintainAspectRatio: true,
      interaction: {
        mode: "index",
        intersect: false,
      },
      plugins: {
        legend: {
          display: false,   // custom legend in HTML above the chart
        },
        tooltip: {
          callbacks: {
            label(ctx) {
              if (ctx.dataset.label.startsWith("Davis") || ctx.dataset.label.startsWith("Price")) {
                const pt = ctx.raw;
                return `${ctx.dataset.label}  price: ${pt.y}  score: ${pt.score ?? ""}`;
              }
              return `${ctx.dataset.label}: ${ctx.parsed.y ?? "—"}`;
            },
          },
        },
      },
      scales: {
        x: {
          ticks: {
            maxTicksLimit: 12,
            maxRotation:   30,
          },
          grid: { color: "#f0f0f0" },
        },
        y: {
          position: "right",
          grid:     { color: "#f0f0f0" },
          ticks:    { maxTicksLimit: 8 },
        },
      },
    },
  });
}

// ── Backtest ─────────────────────────────────────────────────────────────────

async function runBacktest() {
  const btn    = document.getElementById("backtest-btn");
  const result = document.getElementById("backtest-result");

  btn.disabled    = true;
  btn.textContent = "Running… (this may take a moment)";
  result.innerHTML = '<p class="loading">Running backtest…</p>';

  try {
    const res  = await fetch(`/api/backtest/${stockId}`, { method: "POST" });
    const data = await res.json();

    if (!res.ok) {
      result.innerHTML = `<p class="error">Error: ${data.error || "Backtest failed."}</p>`;
      return;
    }

    result.innerHTML = renderBacktest(data);

  } catch (err) {
    result.innerHTML = `<p class="error">Network error: ${err.message}</p>`;
  } finally {
    btn.disabled    = false;
    btn.textContent = "Re-run Backtest";
  }
}

function pct(val) {
  if (val == null) return "N/A";
  const sign = val >= 0 ? "+" : "";
  return `${sign}${Number(val).toFixed(2)}%`;
}

function renderBacktest(d) {
  const m = d.metrics;

  const winColor      = m.win_rate   >= 50  ? "positive" : "negative";
  const returnColor   = m.total_return >= 0  ? "positive" : "negative";
  const drawdownColor = m.max_drawdown <= 10 ? "positive" : "negative";

  const tradesHtml = d.trades.length === 0
    ? `<p class="bt-no-trades">No completed trades in this period.</p>`
    : `
      <div class="bt-trades-wrap">
        <table class="bt-trades">
          <thead>
            <tr>
              <th>Entry</th><th>Exit</th>
              <th>Entry Price</th><th>Exit Price</th>
              <th>Return</th><th>Decision</th>
            </tr>
          </thead>
          <tbody>
            ${d.trades.slice(0, 10).map(t => `
              <tr>
                <td>${t.entry_date}</td>
                <td>${t.exit_date}</td>
                <td>${t.entry_price}</td>
                <td>${t.exit_price}</td>
                <td class="${t.return >= 0 ? "positive" : "negative"}">${pct(t.return)}</td>
                <td><span class="decision-tag">${t.decision}</span></td>
              </tr>
            `).join("")}
          </tbody>
        </table>
        ${d.trades.length > 10 ? `<p class="bt-more">Showing 10 of ${d.trades.length} trades.</p>` : ""}
      </div>
    `;

  return `
    <div class="bt-period">Period: ${d.period.start} → ${d.period.end} &nbsp;|&nbsp; Stock: ${d.stock_id}</div>

    <div class="bt-metrics">
      <div class="bt-metric">
        <div class="bt-metric-label">Trades</div>
        <div class="bt-metric-value">${m.number_of_trades}</div>
      </div>
      <div class="bt-metric">
        <div class="bt-metric-label">Win Rate</div>
        <div class="bt-metric-value ${winColor}">${m.win_rate}%</div>
      </div>
      <div class="bt-metric">
        <div class="bt-metric-label">Avg Return</div>
        <div class="bt-metric-value ${m.average_return >= 0 ? "positive" : "negative"}">${pct(m.average_return)}</div>
      </div>
      <div class="bt-metric">
        <div class="bt-metric-label">Total Return</div>
        <div class="bt-metric-value ${returnColor}">${pct(m.total_return)}</div>
      </div>
      <div class="bt-metric">
        <div class="bt-metric-label">Max Drawdown</div>
        <div class="bt-metric-value ${drawdownColor}">-${m.max_drawdown}%</div>
      </div>
    </div>

    ${tradesHtml}
  `;
}

// ── Boot ─────────────────────────────────────────────────────────────────────
loadAnalysis();
loadChart();
</script>

<!-- Backtest section (always in DOM, below the chart) -->
<section class="card" id="backtest-card">
  <h3>Backtest (2 years, 20-day hold)</h3>
  <button id="backtest-btn" class="btn-primary" onclick="runBacktest()">
    Run Backtest
  </button>
  <div id="backtest-result"></div>
</section>

{% endblock %}
